# =============================================================================
# TMUX LOCAL CONFIG - For your Linux Mint workstation
# =============================================================================
# Install: Copy to ~/.tmux.conf on your LOCAL machine
# PREFIX: Ctrl+a (local) vs Ctrl+b (remote)
# =============================================================================

# -----------------------------------------------------------------------------
# BASICS
# -----------------------------------------------------------------------------

# LOCAL prefix: Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
# escape-time: tmux waits this long after ESC before deciding it's standalone.
# 0ms is ideal locally but breaks over SSH — tmux 3.4 sends OSC 10/11 color
# queries on client attach, and with 0ms the fragmented SSH responses leak as
# garbled text (tmux#3838, microsoft/terminal#18004). 50ms is a safe tradeoff.
set -s escape-time 50
set -g mouse on

# Right-click paste is set after TPM load (bottom of file)

# Ctrl+Right-click = context menu
bind -n C-MouseDown3Pane \
    display-menu -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M \
    "New Window"           w "new-window -c '#{pane_current_path}'" \
    "Rename Window"        r "command-prompt -I '#W' 'rename-window %%'" \
    "Close Window"         x "confirm-before -p 'Kill window? (y/n)' kill-window" \
    "" \
    "Horizontal Split"     h "split-window -v -c '#{pane_current_path}'" \
    "Vertical Split"       v "split-window -h -c '#{pane_current_path}'" \
    "Tile Panes"           g "select-layout tiled" \
    "Close Pane"           c "confirm-before -p 'Kill pane? (y/n)' kill-pane" \
    "" \
    "Swap Up"              u "swap-pane -U" \
    "Swap Down"            d "swap-pane -D" \
    "#{?pane_marked,Unmark,Mark}"  m "select-pane -m" \
    "#{?window_zoomed_flag,Unzoom,Zoom}" z "resize-pane -Z"

# -----------------------------------------------------------------------------
# TERMINAL + CLIPBOARD
# -----------------------------------------------------------------------------

# Terminal type + truecolor
set -g default-terminal "tmux-256color"
set -g terminal-overrides ""
set -ag terminal-overrides ",xterm-kitty:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",tmux-256color:RGB"

# Clipboard: tmux's default terminal-features (xterm*:clipboard) already sets
# the correct Ms capability for OSC 52. Do NOT set Ms in terminal-overrides —
# the common single-param format (Ms=\E]52;c;%p2%s\7) is silently rejected by
# ncurses tparm() in tmux 3.4+ (see tmux issue #4081). Let the defaults work.
set -g set-clipboard on

# Passthrough OFF — prevents DA1 response leaks from programs inside tmux.
set -g allow-passthrough off

# Pre-set pane colors so tmux doesn't need to query the outer terminal via
# OSC 10/11 on client attach. Without this, tmux 3.4 queries the outer terminal
# for fg/bg colors and the responses leak as garbled text over SSH (tmux#3838).
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'

# Preserve DISPLAY and XAUTHORITY so xclip works inside tmux
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_CONNECTION XAUTHORITY"

# -----------------------------------------------------------------------------
# NESTED TMUX: F12 toggles local tmux off/on
# -----------------------------------------------------------------------------

bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style 'bg=#45475a fg=#6c7086' \;\
    set status-left '#[fg=#6c7086,bold][OFF] #[fg=#6c7086][#S] ' \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    set status-left '#[fg=#a6e3a1,bold][LOCAL] #[fg=#a6e3a1][#S] ' \;\
    refresh-client -S

# -----------------------------------------------------------------------------
# SESSION / WINDOW MANAGEMENT
# -----------------------------------------------------------------------------

bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind G select-layout tiled

# Help popup (prefix + h)
bind h display-popup -w 60 -h 35 -E "echo '
  TMUX LOCAL - QUICK REFERENCE
  Prefix = Ctrl+a  (remote = Ctrl+b)

  F12              Toggle local tmux off/on (for nested sessions)

  WINDOWS
    prefix + c           New window
    prefix + ,           Rename window
    Alt + Left/Right     Next/previous window

  PANES
    prefix + |           Split vertical
    prefix + -           Split horizontal
    Alt + arrows         Navigate panes
    prefix + z           Zoom pane
    prefix + G           Tile panes

  COPY
    Select with mouse    Copies to clipboard
    prefix + [           Enter copy mode
    v = select, y = yank
    Right-click          Paste
    Ctrl+Shift+V         Paste from system clipboard

  prefix + r  Reload     prefix + I  Install plugins
  prefix + h  This help

  Press q to close
' | less -R"

# -----------------------------------------------------------------------------
# MONITORING
# -----------------------------------------------------------------------------

setw -g monitor-activity on
set -g visual-activity on
set -g visual-bell off
set -g bell-action any
set -g activity-action other
set -g silence-action other
set -g display-time 2000

# -----------------------------------------------------------------------------
# STATUS BAR - GREEN = LOCAL
# -----------------------------------------------------------------------------

set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left-length 40
set -g status-left '#[fg=#a6e3a1,bold][LOCAL] #[fg=#a6e3a1][#S] '
set -g status-right-length 60
set -g status-right '#[fg=#a6adc8]#H #[fg=#a6e3a1]│ #[fg=#a6adc8]%H:%M'
setw -g window-status-format ' #I:#W#F '
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W#F '
setw -g window-status-activity-style 'fg=#f9e2af,bold'
setw -g window-status-bell-style 'fg=#f38ba8,bold'

# -----------------------------------------------------------------------------
# PANE STYLING - green borders
# -----------------------------------------------------------------------------

set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#a6e3a1'
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{pane_title} '

# -----------------------------------------------------------------------------
# COPY MODE - bindings set after TPM load (bottom of file)
# -----------------------------------------------------------------------------

setw -g mode-keys vi

# -----------------------------------------------------------------------------
# PLUGINS
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session save/restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Theme - Catppuccin
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "session host date_time"

# Fuzzy finder (prefix + F) — requires: sudo apt install fzf
set -g @plugin 'sainnhe/tmux-fzf'

# Quick copy URLs, paths, hashes (prefix + Space)
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key Space

# -----------------------------------------------------------------------------
# INITIALIZE TPM (keep at very bottom)
# -----------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'

# Override plugin defaults — must come AFTER TPM
# Clipboard: set-clipboard on + default Ms handles OSC 52 automatically.
# copy-selection-and-cancel → tmux buffer + system clipboard (via OSC 52).
bind -n MouseDown3Pane paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
